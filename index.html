<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cycleless — Чек-лист: 10 точек утечки прибыли</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --accent: #d4ff33;
      --accent-dim: rgba(212,255,51,0.08);
      --accent-border: rgba(212,255,51,0.25);
      --bg: #07080a;
      --bg-2: #0c0f13;
      --bg-3: #111620;
      --border: rgba(255,255,255,0.06);
      --text: #dde4ec;
      --muted: #5a6a7a;
      --font-d: 'Syne', sans-serif;
      --font-b: 'DM Sans', sans-serif;
      --font-m: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(212,255,51,.025) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(212,255,51,.025) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
      z-index: 0;
    }
    .landing {
      position: relative;
      z-index: 1;
      max-width: 800px;
      width: 100%;
      padding: 40px 28px 60px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo svg { width: 44px; height: 44px; }
    .logo span {
      font-family: var(--font-d);
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .logo span .accent { color: var(--accent); }
    .title {
      font-family: var(--font-d);
      font-weight: 800;
      font-size: 38px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .subtitle {
      font-family: var(--font-m);
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .checklist {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .check-item {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      position: relative;
      transition: border-color 0.2s;
    }
    .check-item.checked {
      border-color: var(--accent-border);
      background: rgba(212,255,51,0.03);
    }
    .check-item .row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .custom-checkbox {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 2px solid var(--muted);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 2px;
    }
    .custom-checkbox i {
      color: var(--accent);
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .check-item.checked .custom-checkbox {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .check-item.checked .custom-checkbox i { opacity: 1; }
    .question-text {
      flex: 1;
      font-size: 17px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .solution-block {
      display: none;
      margin-top: 18px;
      padding: 16px 20px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
    }
    .check-item.checked .solution-block { display: block; }
    .solution-block .solution-title {
      font-family: var(--font-m);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .result-box {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .result-counter {
      font-family: var(--font-d);
      font-size: 48px;
      font-weight: 800;
      color: var(--accent);
    }
    .result-message {
      font-size: 16px;
      color: var(--text);
      max-width: 500px;
    }
    .button-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 30px;
      font-family: var(--font-m);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-accent {
      background: var(--accent);
      color: #07080a;
      border: 2px solid var(--accent);
    }
    .btn-accent:hover { background: #c0e830; }
    .btn-outline {
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
    }
    .btn-outline:hover { background: rgba(212,255,51,0.15); }
    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
    }
    .hidden-input { display: none; }
    @media print {
      .btn, .button-group { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="landing" id="landingContent">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="44" height="44" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="6" fill="#050806"/>
          <path d="M16 5L25.5 10.5V21.5L16 27L6.5 21.5V10.5L16 5Z" stroke="#D4FF33" stroke-width="2" stroke-linejoin="round"/>
          <path d="M16 5V16L25.5 21.5M16 16L6.5 22M16 27V16L25.5 10.5M16 16L6.5 10.5" stroke="#D4FF33" stroke-width="1.2" opacity="0.9"/>
          <circle cx="16" cy="16" r="1.5" fill="#D4FF33"/>
        </svg>
        <span>Cycle<span class="accent">less</span></span>
      </div>
    </div>
    <div>
      <div class="title">Пройдите 10-минутный аудит</div>
      <div class="subtitle">Где ваша компания теряет деньги из-за ручной работы?</div>
    </div>

    <!-- Чек-лист -->
    <div class="checklist" id="checklistContainer">
      <!-- Пункты будут вставлены через JS -->
    </div>

    <!-- Результат -->
    <div class="result-box" id="resultBox">
      <div class="result-counter" id="resultCounter">0 / 10</div>
      <div class="result-message" id="resultMessage">Отметьте пункты, которые относятся к вашему бизнесу, чтобы получить рекомендацию.</div>
    </div>

    <!-- Кнопки действий -->
    <div class="button-group" id="actionButtons">
      <a href="https://t.me/cycleless_channel" target="_blank" class="btn btn-outline"><i class="fab fa-telegram"></i> Больше пользы в Telegram</a>
    </div>
    <div class="footer-note">© Cycleless — AI-интегратор. Превращаем хаос в автономный конвейер.</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
  </script>
  </script>

  <script>
    // Данные чек-листа (10 пунктов)
    const checklistData = [
      {
        id: 1,
        question: "Уволился ключевой сотрудник — и процесс встал. Новичок вместо 2 недель учится 2 месяца, потому что регламентов нет или они устарели. Сколько часов в неделю ваши люди тратят на вопрос «А кто знает, как это сделать?»",
        solution: "Автоматизация: ИИ-базы знаний и ассистенты по внутренним регламентам (RAG).",
      },
      {
        id: 2,
        question: "Вспомните вчерашний день ваших менеджеров. Сколько раз они копировали данные из почты в CRM, из CRM в таблицу, из таблицы в 1С? Если больше 2 раз для одной сущности — это зомби-процесс, который сожрал ваши деньги.",
        solution: "Автоматизация: RPA-боты и интеграционные шины (iPaaS).",
      },
      {
        id: 3,
        question: "Заявка падает в CRM. Сколько минут проходит до первого касания клиентом? Если больше 5 минут (ночью, в выходной, в обед) — лид остывает и уходит к конкурентам. Вы уверены, что ваш процесс 24/7?",
        solution: "Автоматизация: Триггерные цепочки, ИИ-ассистенты первичного квалифицирования.",
      },
      {
        id: 4,
        question: "Ваша CRM говорит одно, склад в 1С — другое, а кассир в магазине — третье. Как часто вы ловите расхождения, из-за которых компания теряет деньги (пересортица, скидки не тем, упущенные заказы)?",
        solution: "Автоматизация: Микросервисные шины данных (ESB/API), мастер-системы (MDM).",
      },
      {
        id: 5,
        question: "Вы точно знаете, что на счетах будет хватать денег на выплаты зарплаты и налогов через 3 недели? Или вы каждый раз собираете баланс ручками в Excel, матерясь и считая дебет с кредитом в ночь перед оплатой?",
        solution: "Автоматизация: Авто-сверка с банками, платежные календари, интеграция 1С с CRM.",
      },
      {
        id: 6,
        question: "Менеджер по ошибке слил базу клиентов конкуренту, или отправил договор с печатью не в ту группу в Telegram. Как быстро вы об этом узнаете и сможете это предотвратить до того, как прилетит штраф?",
        solution: "Автоматизация: DLP-системы, ИИ-модерация документов, автоматическое сокрытие персональных данных.",
      },
      {
        id: 7,
        question: "Вам нужно добавить новый канал продаж (например, Авито или маркетплейс) или сменить логистическую компанию. Это требует 3 месяца доработок программиста и миллион рублей? Ваша система монолитна, как бетонный блок?",
        solution: "Автоматизация: Микросервисы, Low-Code платформы, архитектура plug-and-play коннекторов.",
      },
      {
        id: 8,
        question: "Руководитель спрашивает: «Какая чистая прибыль по проекту X с учетом возвратов на прошлой неделе?». Через сколько минут/часов/дней ему дадут точный ответ? Если ответ: «На следующей неделе соберу данные» — вы управляете бизнесом вслепую.",
        solution: "Автоматизация: Data Pipelines, дашборды реального времени, ИИ-аналитика.",
      },
      {
        id: 9,
        question: "Вы купили крутую систему, но 40% сотрудников заводят данные криво, а 20% вообще саботируют и ведут учет в своих блокнотах. Сложность интерфейса убивает смысл автоматизации?",
        solution: "Автоматизация: Low-Code порталы под роли, ИИ-ассистенты, которые делают работу по голосовой команде или одному клику.",
      },
      {
        id: 10,
        question: "Есть ли у вас процессы, которые делаются «потому что так исторически сложилось», но никто не знает, кто их потребляет? (Например, ежедневный отчет, который никто не читает, или двойное согласование документа).",
        solution: "Автоматизация: Process Mining (интеллектуальный анализ логов систем), выявление аномалий и дублирующих шагов.",
      }
    ];

    const checklistContainer = document.getElementById('checklistContainer');
    const resultCounter = document.getElementById('resultCounter');
    const resultMessage = document.getElementById('resultMessage');

    // Генерация чек-листа
    function renderChecklist() {
      checklistContainer.innerHTML = '';
      checklistData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'check-item';
        div.dataset.id = item.id;
        div.innerHTML = `
          <div class="row">
            <div class="custom-checkbox" onclick="toggleItem(${item.id})">
              <i class="fas fa-check"></i>
            </div>
            <div class="question-text" onclick="toggleItem(${item.id})">${item.question}</div>
          </div>
          <div class="solution-block">
            <div class="solution-title"><i class="fas fa-lightbulb"></i> Решение Cycleless</div>
            ${item.solution}
          </div>
        `;
        checklistContainer.appendChild(div);
      });
    }

    // Состояние отметок
    let checkedSet = new Set();

    function toggleItem(id) {
      if (checkedSet.has(id)) {
        checkedSet.delete(id);
      } else {
        checkedSet.add(id);
      }
      updateUI();
    }

    function updateUI() {
      // Обновить классы чек-итемов
      document.querySelectorAll('.check-item').forEach(item => {
        const id = parseInt(item.dataset.id);
        if (checkedSet.has(id)) {
          item.classList.add('checked');
        } else {
          item.classList.remove('checked');
        }
      });
      // Обновить результат
      const count = checkedSet.size;
      resultCounter.textContent = count + ' / 10';
      let message = '';
      if (count === 0) {
        message = 'Отметьте пункты, которые относятся к вашему бизнесу, чтобы получить рекомендацию.';
      } else if (count <= 3) {
        message = 'У вас всё неплохо, нужны точечные RPA-решения.';
      } else if (count <= 6) {
        message = 'У вас системный кризис интеграций, пора строить микросервисную архитектуру и внедрять ИИ-ассистентов.';
      } else {
        message = 'Ваш бизнес в шаге от коллапса при росте. Нужна полная ре-архитектура и гиперавтоматизация с Low-Code.';
      }
      resultMessage.textContent = message;
    }

    // Инициализация
    renderChecklist();
    updateUI();
  </script>
</body>
</html>
